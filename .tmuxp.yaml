session_name: atuin-ai-adapter
windows:
  - window_name: atuin-ai-adapter
    layout: main-vertical
    options:
      main-pane-width: 20%
    panes:
      - shell_command:
          - cd ~/Documents/Projects/atuin-ai-adapter
          # - nvim Notes.md ToDo.md
          - open-project
      - shell_command:
          - tmux resizep -y 85%
          - filelist-open "startup_files.txt" atuin-ai-adapter
        focus: true
      - clear
